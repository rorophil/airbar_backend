# Product model
class: Product
table: products
fields:
  name: String
  description: String?
  price: double
  categoryId: int
  stockQuantity: int, default=0 # Number of complete unopened units
  minStockAlert: int, default=5
  currentUnitRemaining: double? # Quantity remaining in the opened unit (for bulk products)
  imageUrl: String?
  isActive: bool, default=true
  isDeleted: bool, default=false
  # Bulk/retail product fields
  isBulkProduct: bool, default=false
  bulkUnit: String? # e.g., "litres", "kg"
  bulkTotalQuantity: double? # Total quantity per unit (e.g., 6 litres per keg)
  createdAt: DateTime
  updatedAt: DateTime

indexes:
  products_category_idx:
    fields: categoryId
  products_deleted_idx:
    fields: isDeleted, isActive
